name: tests

on:
  push:
  pull_request:

jobs:
  pest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, dom, fileinfo, sqlite, pdo_sqlite
          coverage: none

      - name: Copy environment file
        run: cp .env.example .env

      - name: Configure SQLite for testing
        run: |
          php -r "file_put_contents('.env', preg_replace(['/^DB_CONNECTION=.*/m', '/^DB_DATABASE=.*/m'], ['DB_CONNECTION=sqlite', 'DB_DATABASE=database/database.sqlite'], file_get_contents('.env')));"

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Generate application key
        run: php artisan key:generate

      - name: Run tests
        run: composer run test