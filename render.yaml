services:
  - type: web
    name: filmness
    runtime: docker
    plan: free
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 8080
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info
      - key: FILESYSTEM_DISK
        value: public
      - key: QUEUE_CONNECTION
        value: sync
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: /var/www/html/storage/database.sqlite
    disks:
      - name: storage
        mountPath: /var/www/html/storage
        sizeGB: 1